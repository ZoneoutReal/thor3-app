name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # All public by design (shipped to the browser).
      NEXT_PUBLIC_BASE_PATH: /thor3-app
      NEXT_PUBLIC_SUPABASE_URL: https://etcycopvymrrkrvsshbn.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_QQi7i6UOrk72PhqogYD2Vg_xrNpL2H7
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BL9UJ3B76PZKM-lH_eeLU2igjBEpQgXvEkasz-VNW8yAS1PdYINxiQeC2zRM8zs_ygPRT4w6y2qw8O0XW9ac1Ck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # GitHub Pages otherwise strips the _next/ directory (Jekyll ignores underscores).
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
